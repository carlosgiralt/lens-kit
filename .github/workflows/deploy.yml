name: Build and deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Step 1 — build the library (UMD + ESM bundles)
      # Outputs: dist/lens-kit.umd.js  dist/lens-kit.es.js
      - name: Build library
        run: pnpm build

      # Stash the bundles before the sandbox build wipes dist/
      - name: Stash library bundles
        run: mkdir -p /tmp/lib-dist && cp dist/lens-kit.*.js /tmp/lib-dist/

      # Step 2 — build the sandbox (index.html dev demo)
      # Vite clears dist/ before writing; that's why we stashed above.
      - name: Build sandbox
        run: pnpm exec vite build

      # Step 3 — merge: put the library bundles back into dist/
      # Final dist/ layout:
      #   dist/index.html              → https://<user>.github.io/lens-kit/
      #   dist/assets/…                → sandbox JS/CSS chunks
      #   dist/lens-kit.umd.js         → CDN UMD bundle
      #   dist/lens-kit.es.js          → CDN ESM bundle
      - name: Merge library bundles into dist
        run: cp /tmp/lib-dist/lens-kit.*.js dist/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
